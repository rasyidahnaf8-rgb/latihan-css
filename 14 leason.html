<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lesson 14 - Position Fixed</title>
  <style>
    body {
      height: 3000px; /* biar bisa scroll */
      font-family: Arial;
      margin: 0;
    }

    /* 14a */
    .fixed-box {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: black;
      color: white;
      padding: 10px;
    }

    /* 14b */
    .sidebar {
      position: fixed;
      right: 0;
      top: 0;
      width: 100px;
      height: 100%;
      background: green;
      color: white;
      text-align: center;
      padding-top: 20px;
    }

    /* 14c */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
    }

    /* 14d (modal) */
    .overlay-flex {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);

      display: flex;
      justify-content: center;
      align-items: center;
    }

    .modal {
      background: white;
      padding: 20px;
      border-radius: 5px;
      width: 300px;
    }

    /* 14e (header) */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: white;
      border-bottom: 1px solid #ccc;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }

    .btn {
      padding: 5px 10px;
      border: none;
      border-radius: 3px;
      cursor: pointer;
    }

    .add {
      background: blue;
      color: white;
    }

    /* 14f (discord sidebar) */
    .left-sidebar {
      position: fixed;
      left: 0;
      top: 60px;
      bottom: 0;
      width: 60px;
      background: #222;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding-top: 10px;
    }

    .left-sidebar img {
      width: 40px;
      border-radius: 50%;
    }

    .second-sidebar {
      position: fixed;
      left: 60px;
      top: 60px;
      bottom: 0;
      width: 150px;
      background: #333;
      color: white;
      padding: 10px;
    }

  </style>
</head>
<body>

  <!-- 14e HEADER -->
  <div class="header">
    <div class="header-left">
      <img src="../lat_image/my wife.jpg" class="avatar">
      <div>Oliver Cat</div>
    </div>

    <div>
      <button class="btn add">Add Friend</button>
      <button class="btn">Message</button>
    </div>
  </div>

  <!-- 14f SIDEBAR -->
  <div class="left-sidebar">
    <img src="../lat_image/Wuthering waves - Ciaccona.jpg">
    <img src="../lat_image/꧁༒☬Discord Profile Chisa Whutering Waves☬༒꧂.jpg">
    <img src="../lat_image/Aemeath.jpg">
  </div>

  <div class="second-sidebar">
    <div><b>INFO</b></div>
    <div># new-videos</div>
    <div># updates</div>
    <div># faq</div>
  </div>

  <!-- 14b RIGHT SIDEBAR -->
  <div class="sidebar">right sidebar</div>

  <!-- 14a FIXED BOX -->
  <div class="fixed-box">bottom-right</div>

  <!-- 14d MODAL -->
    <div class="overlay-flex" id="overlay">
    <div class="modal">
      <h3>Modal Title</h3>
      <p>This is a modal</p>
      <button id="closeBtn">Close</button>
    </div>
  </div>

  <script>
  const overlay = document.getElementById("overlay");
  const closeBtn = document.getElementById("closeBtn");

  closeBtn.addEventListener("click", () => {
    overlay.style.display = "none";
  });
</script>
</body>
</html>
